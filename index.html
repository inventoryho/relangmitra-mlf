<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Aplikasi Rekap HDL</title>

<style>

html,body{

margin:0;

height:100%;

overflow:hidden;

}

iframe{

width:100%;

height:100%;

border:0;

}

#error{

display:none;

font-family:Arial;

text-align:center;

padding-top:100px;

}

</style>

</head>

<body>

<div id="error">

<h2>Apps Script tidak dapat dimuat.</h2>

<p>Silakan buka langsung aplikasi.</p>

<p>

<a href="https://script.google.com/macros/s/AKfycbzvVSLX263GmWek1tl_Ekag2RuEGDhAwXEuj43HYb_BU58DwV_InohLLt4MVOfTfeqN/exec">

Klik di sini

</a>

</p>

</div>

<iframe

id="app"

src="https://script.google.com/macros/s/AKfycbzvVSLX263GmWek1tl_Ekag2RuEGDhAwXEuj43HYb_BU58DwV_InohLLt4MVOfTfeqN/exec">

</iframe>

<script>

const iframe=document.getElementById("app");

iframe.onerror=function(){

iframe.style.display="none";

document.getElementById("error").style.display="block";

};

</script>

</body>

</html>
